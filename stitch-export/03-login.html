<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PetLink — Login / Signup</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen bg-stone-50 font-sans text-stone-900">

<div class="min-h-screen flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8 gap-12">

  <!-- Sign In Variant -->
  <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-lg space-y-6">
    <div class="text-center">
      <h2 class="text-2xl font-extrabold text-stone-900">Sign in to PetLink</h2>
      <p class="mt-2 text-sm text-stone-500">Book trusted pet care in your neighborhood</p>
    </div>

    <!-- OAuth Buttons -->
    <div class="space-y-3">
      <button class="w-full flex items-center justify-center gap-3 px-4 py-2.5 border border-stone-300 rounded-lg text-sm font-medium text-stone-700 hover:bg-stone-50 transition-colors">
        <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>
      <button class="w-full flex items-center justify-center gap-3 px-4 py-2.5 border border-stone-300 rounded-lg text-sm font-medium text-stone-700 hover:bg-stone-50 transition-colors">
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
        Continue with Apple
      </button>
      <button class="w-full flex items-center justify-center gap-3 px-4 py-2.5 border border-stone-300 rounded-lg text-sm font-medium text-stone-700 hover:bg-stone-50 transition-colors">
        <svg class="w-5 h-5" fill="#1877F2" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
        Continue with Facebook
      </button>
    </div>

    <!-- Divider -->
    <div class="relative">
      <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-stone-200"></div></div>
      <div class="relative flex justify-center"><span class="bg-white px-4 text-xs text-stone-400 font-medium uppercase">or sign in with email</span></div>
    </div>

    <!-- Form -->
    <form class="space-y-4">
      <input type="email" placeholder="Email address" value="owner@example.com" class="w-full px-3 py-2.5 border border-stone-300 placeholder-stone-500 text-stone-900 rounded-lg focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 text-sm">
      <input type="password" placeholder="Password" value="password123" class="w-full px-3 py-2.5 border border-stone-300 placeholder-stone-500 text-stone-900 rounded-lg focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 text-sm">
      <button type="submit" class="w-full py-2.5 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500 transition-colors">Sign in</button>
    </form>

    <p class="text-center text-sm text-stone-600">Don't have an account? <button class="text-emerald-600 hover:text-emerald-500 font-medium">Create account</button></p>
  </div>

  <!-- Sign Up Variant -->
  <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-lg space-y-6">
    <div class="text-center">
      <h2 class="text-2xl font-extrabold text-stone-900">Create your account</h2>
      <p class="mt-2 text-sm text-stone-500">Book trusted pet care in your neighborhood</p>
    </div>

    <form class="space-y-4">
      <input type="text" placeholder="Full name" class="w-full px-3 py-2.5 border border-stone-300 placeholder-stone-500 text-stone-900 rounded-lg focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 text-sm">
      <input type="email" placeholder="Email address" class="w-full px-3 py-2.5 border border-stone-300 placeholder-stone-500 text-stone-900 rounded-lg focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 text-sm">
      <div>
        <input type="password" placeholder="Password (min 8 characters)" class="w-full px-3 py-2.5 border border-stone-300 placeholder-stone-500 text-stone-900 rounded-lg focus:outline-none focus:ring-emerald-500 focus:border-emerald-500 text-sm">
      </div>
      <label class="flex items-center gap-2 text-sm text-stone-600">
        <input type="checkbox" class="rounded border-stone-300 text-emerald-600 focus:ring-emerald-500">
        I confirm I am 13 years of age or older
      </label>
      <button type="submit" class="w-full py-2.5 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700 transition-colors disabled:opacity-50">Create account</button>
    </form>

    <p class="text-center text-sm text-stone-600">Already have an account? <button class="text-emerald-600 hover:text-emerald-500 font-medium">Sign in</button></p>
  </div>

</div>
</body>
</html>
